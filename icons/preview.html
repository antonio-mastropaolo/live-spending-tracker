<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spend Tracker — Icon Set</title>
<style>
  body { background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, system-ui, sans-serif; padding: 32px; margin: 0; }
  h1 { font-weight: 700; margin: 0 0 4px 0; }
  h1 span { color: #22c55e; }
  p.sub { color: #888; margin: 0 0 32px 0; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; transition: transform .15s, border-color .15s; }
  .card:hover { transform: translateY(-2px); border-color: #333; }
  .card img { width: 72px; height: 72px; }
  .card .name { font-size: 12px; color: #aaa; margin-top: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  .card .file { font-size: 10px; color: #555; margin-top: 4px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <h1>Spend <span>Tracker</span> · Icon Set</h1>
  <p class="sub">10 SVG icons · neon accent on near-black · 64×64 viewBox</p>
  <div class="grid">
    <div class="card"><img src="app-icon.svg"><div class="name">App</div><div class="file">app-icon.svg</div></div>
    <div class="card"><img src="burn-rate.svg"><div class="name">Burn Rate</div><div class="file">burn-rate.svg</div></div>
    <div class="card"><img src="live.svg"><div class="name">Live</div><div class="file">live.svg</div></div>
    <div class="card"><img src="history.svg"><div class="name">History</div><div class="file">history.svg</div></div>
    <div class="card"><img src="reconciled.svg"><div class="name">Reconciled</div><div class="file">reconciled.svg</div></div>
    <div class="card"><img src="anthropic.svg"><div class="name">Anthropic</div><div class="file">anthropic.svg</div></div>
    <div class="card"><img src="openai.svg"><div class="name">OpenAI</div><div class="file">openai.svg</div></div>
    <div class="card"><img src="auth-error.svg"><div class="name">Auth Error</div><div class="file">auth-error.svg</div></div>
    <div class="card"><img src="reset.svg"><div class="name">Reset</div><div class="file">reset.svg</div></div>
    <div class="card"><img src="quit.svg"><div class="name">Quit</div><div class="file">quit.svg</div></div>
  </div>
</body>
</html>
