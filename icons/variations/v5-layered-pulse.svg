<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="v5bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="v5shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="v5dollar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="v5glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="22" fill="url(#v5bg)"/>
  <!-- Outer shield -->
  <path d="M64 12 L104 24 L104 64 C104 88, 86 106, 64 116 C42 106, 24 88, 24 64 L24 24 Z"
        fill="url(#v5shield)" stroke="#64748b" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M64 22 L96 32 L96 64 C96 82, 82 96, 64 104 C46 96, 32 82, 32 64 L32 32 Z"
        fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Pulse waveform across -->
  <g filter="url(#v5glow)" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="34,68 40,68 44,58 48,78 52,68 60,68"/>
  </g>
  <g filter="url(#v5glow)" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round">
    <polyline points="68,68 76,68 80,58 84,78 88,68 94,68"/>
  </g>
  <!-- Dollar sign -->
  <g filter="url(#v5glow)" stroke="url(#v5dollar)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M76 46 C76 40, 70 36, 64 36 C58 36, 52 40, 52 46 C52 52, 58 54, 64 56 C70 58, 76 60, 76 66 C76 72, 70 76, 64 76 C58 76, 52 72, 52 66"/>
    <line x1="64" y1="30" x2="64" y2="36"/>
    <line x1="64" y1="76" x2="64" y2="82"/>
  </g>
  <!-- Trending arrow over the dollar -->
  <g filter="url(#v5glow)" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <polyline points="44,90 56,82 66,88 84,72"/>
    <polyline points="76,72 84,72 84,80"/>
  </g>
  <!-- Outer accent bolts -->
  <g fill="#22c55e" filter="url(#v5glow)">
    <circle cx="20" cy="40" r="1.5"/>
    <circle cx="22" cy="96" r="1.2"/>
  </g>
  <g fill="#06b6d4" filter="url(#v5glow)">
    <circle cx="108" cy="40" r="1.5"/>
    <circle cx="106" cy="96" r="1.2"/>
  </g>
</svg>
