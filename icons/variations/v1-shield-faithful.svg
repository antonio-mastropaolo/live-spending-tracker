<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="v1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="v1shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4554"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="v1dollar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="v1glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="22" fill="url(#v1bg)"/>
  <!-- Shield -->
  <path d="M64 14 L102 26 L102 64 C102 86, 84 104, 64 114 C44 104, 26 86, 26 64 L26 26 Z"
        fill="url(#v1shield)" stroke="#475569" stroke-width="1.5"/>
  <path d="M64 22 L94 31 L94 64 C94 82, 80 96, 64 104 C48 96, 34 82, 34 64 L34 31 Z"
        fill="none" stroke="#64748b" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Circuit traces (green, left) -->
  <g filter="url(#v1glow)" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M16 70 L36 70 L46 60 L60 60"/>
    <path d="M14 86 L30 86 L40 76"/>
    <circle cx="16" cy="70" r="2" fill="#22c55e"/>
    <circle cx="14" cy="86" r="1.5" fill="#22c55e"/>
  </g>
  <!-- Circuit traces (cyan, right) -->
  <g filter="url(#v1glow)" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M68 68 L82 68 L92 78 L114 78"/>
    <path d="M76 56 L98 56 L108 46"/>
    <circle cx="114" cy="78" r="2" fill="#06b6d4"/>
    <circle cx="108" cy="46" r="1.5" fill="#06b6d4"/>
  </g>
  <!-- Dollar sign -->
  <g filter="url(#v1glow)" stroke="url(#v1dollar)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M76 48 C76 42, 70 38, 64 38 C58 38, 52 42, 52 48 C52 54, 58 56, 64 58 C70 60, 76 62, 76 68 C76 74, 70 78, 64 78 C58 78, 52 74, 52 68"/>
    <line x1="64" y1="32" x2="64" y2="38"/>
    <line x1="64" y1="78" x2="64" y2="84"/>
  </g>
  <!-- Trending arrow -->
  <g filter="url(#v1glow)" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="46,72 58,60 68,68 84,46"/>
    <polyline points="76,46 84,46 84,54"/>
  </g>
  <!-- Accent particles -->
  <g fill="#22c55e" opacity="0.7">
    <circle cx="22" cy="40" r="1.2"/>
    <circle cx="20" cy="100" r="1"/>
  </g>
  <g fill="#06b6d4" opacity="0.7">
    <circle cx="106" cy="32" r="1.2"/>
    <circle cx="110" cy="100" r="1"/>
  </g>
</svg>
